name: Blog Content Automation with Groq

on:
  push:
    branches:
      - main
  schedule:
    # Menjalankan otomatis setiap hari jam 7 pagi WIB (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan kamu menjalankan manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install groq

    - name: Run blog generator
      env:
        # Ini mengambil API Key dari GitHub Secrets
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python generate_blog_groq.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git commit -m "Update blog content via Groq AI" || echo "No changes to commit"
        git push
